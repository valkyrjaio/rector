name: Update Dependencies

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  update-dependencies:
    uses: valkyrjaio/.github/.github/workflows/_update-php-dependencies.yml@2bbc24ee6f121652e6be7a6a9a7a32a376f9a817
    secrets: inherit
    with:
      php-version: '8.4'
      dependencies: |
        [
          {"name": "Root Packages",  "command": "update",                  "directory": "."},
          {"name": "Rector",         "command": "rector-composer-update",   "directory": ".github/ci/rector"}
        ]