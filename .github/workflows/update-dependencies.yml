name: Update Dependencies

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  update-dependencies:
    uses: valkyrjaio/.github/.github/workflows/_update-php-dependencies.yml@95cda0ed015efe46c0f0577b2c0e103b68a1ef80
    secrets: inherit
    with:
      php-version: '8.4'
      dependencies: |
        [
          {"name": "Root Packages",  "command": "update",                  "directory": "."},
          {"name": "Rector",         "command": "rector-composer-update",   "directory": ".github/ci/rector"}
        ]