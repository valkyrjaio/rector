name: Create a New Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version component to bump'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - rc

run-name: "Release ${{ inputs.bump }} bump on ${{ github.ref_name }}"

permissions:
  contents: write

jobs:
  release:
    uses: valkyrjaio/.github/.github/workflows/_create-php-release.yml@2bbc24ee6f121652e6be7a6a9a7a32a376f9a817
    secrets: inherit
    with:
      bump: ${{ inputs.bump }}
      dependencies: |
        [
          {"name": "Root Packages", "command": "root-outdated-check"},
          {"name": "Rector",  "command": "rector-outdated-check"}
        ]
      info-class-path: src/Rector/Constant/RectorInfo.php
      info-class-name: RectorInfo