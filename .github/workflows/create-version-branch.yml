name: Create Major Release Version Branch

on: workflow_dispatch

run-name: Create new version for upcoming major release

jobs:
  check-outdated-dependencies:
    name: Check Outdated Dependencies
    uses: valkyrjaio/.github/.github/workflows/_check-outdated-php-dependencies.yml@2bbc24ee6f121652e6be7a6a9a7a32a376f9a817
    secrets: inherit
    with:
      php-version: '8.4'
      dependencies: |
        [
          {"name": "Root Packages", "command": "root-outdated-check-major-release"},
          {"name": "Rector", "command": "rector-outdated-check-major-release"}
        ]

  get-version:
    needs: check-outdated-dependencies
    uses: valkyrjaio/.github/.github/workflows/_get-version.yml@2bbc24ee6f121652e6be7a6a9a7a32a376f9a817
    secrets: inherit

  create:
    needs: get-version
    uses: valkyrjaio/.github/.github/workflows/_create-version-branch.yml@2bbc24ee6f121652e6be7a6a9a7a32a376f9a817
    secrets: inherit
    with:
      version: ${{ needs.get-version.outputs.version }}
      branch: ${{ needs.get-version.outputs.branch }}