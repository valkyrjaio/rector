name: Rector

on:
  push:
    branches: [ 'master', '*.x' ]
  pull_request:
    branches: [ 'master', '*.x' ]

jobs:
  rector:
    name: Rector
    uses: ./.github/workflows/_workflow-call.yml
    permissions:
      pull-requests: write
      contents: read
    with:
      php-version: '8.4'
      paths: |
        ci:
          - '.github/ci/rector/**'
          - '.github/workflows/rector.yml'
          - '.github/workflows/_workflow-call.yml'
        files:
          - '.github/ci/rector/**'
          - '.github/workflows/rector.yml'
          - '.github/workflows/_workflow-call.yml'
          - 'src/**/*.php'
          - 'tests/**/*.php'
          - 'composer.json'
